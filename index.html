<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeonsu | Official</title>
    <meta name="naver-site-verification" content="40755a6a7b1880b3091867b98fc561f694b256d6" />
    <meta name="description" content="Evolving landscapes of sound by Yeonsu.">
    <meta property="og:title" content="Yeonsu | Official">
    <meta property="og:description" content="Echoes of the internal journey.">
    <meta property="og:image" content="Profile.JPG">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="icon" type="image/png" href="Favicon.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Herr+Von+Muellerhoff&display=block" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("noI6vApUfz1edbWge"); })();
    </script>

 <style>
:root {
    --bg-color: #f2ede4; 
    --text-main: #2d2a26; 
    --text-dim: #7d756d;
    --text-very-dim: #b8b1a9; 
    --accent: #e5e0d8; 
    --point-color: #8b3a2b; 
    --dark-brown: #3d2b1f;  
}

body {
    background-color: var(--bg-color); 
    color: var(--text-main); 
    margin: 0;
    font-family: 'Apple SD Gothic Neo', sans-serif; 
    display: flex; 
    flex-direction: column; 
    min-height: 100vh;
    -webkit-user-select: none; 
    user-select: none;
    cursor: url('cursor.png?v=2026_final') 8 8, auto !important;
}

a, button, .logo-wrapper, .social-links a, nav ul li a, [onclick] {
    cursor: url('cursor.png?v=2026_final') 8 8, pointer !important;
}

header h1, .logo-wrapper h1 { 
    color: var(--dark-brown) !important; 
    transition: none !important;
}

nav ul li a { 
    text-decoration: none; 
    color: var(--text-dim); 
    font-size: 0.85rem; 
    letter-spacing: 0.15em; 
    transition: 0.2s; 
}
nav ul li a:hover { 
    color: var(--point-color) !important; 
}
nav ul li a.active { 
    color: var(--point-color) !important; 
    font-weight: 500; 
    letter-spacing: 0.5em; 
}

.social-links a { 
    text-decoration: none; 
    color: var(--text-dim); 
    transition: 0.3s; 
    padding: 0 10px;
}
.social-links a:hover { 
    color: var(--point-color) !important; 
}

.submit-btn { 
    background: var(--dark-brown); 
    color: var(--bg-color); 
    border: none; 
    padding: 20px; 
    font-size: 0.8rem; 
    letter-spacing: 0.3em; 
    cursor: pointer; 
    transition: 0.4s; 
    margin-top: 40px; 
    width: 100%; 
    font-weight: 500; 
}
.submit-btn:hover { 
    background-color: var(--point-color) !important; 
    letter-spacing: 0.4em; 
}
.submit-btn:disabled { background: var(--text-very-dim); cursor: not-allowed; }

header { padding: 60px 0 40px; text-align: center; z-index: 10; }
.logo-wrapper { display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; }

header h1 {
    font-family: 'Herr Von Muellerhoff', cursive;
    font-size: 5.5rem; /* 선이 가늘어서 글자 크기를 살짝 키우는 게 예쁩니다 */
    line-height: 1.2;
    padding: 10px 20px;
    letter-spacing: 0em; 
    font-weight: 400; 
    margin: 0;
    -webkit-tap-highlight-color: transparent;
    display: inline-block;
}

.container { 
    position: relative; max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 20px; 
    box-sizing: border-box; flex-grow: 1; display: flex; justify-content: center; align-items: center; min-height: 500px; 
}

nav { position: absolute; left: 40px; top: 58px; width: 150px; z-index: 100; }
nav ul { list-style: none; padding: 0; margin: 0; }
nav ul li { margin-bottom: 22px; }

#content-area { width: 100%; display: flex; justify-content: center; align-items: center; min-height: 400px; box-sizing: border-box; padding: 0 170px; }

.album-notice { color: var(--point-color); font-size: 1.8rem; letter-spacing: 0.2em; line-height: 1.6; text-align: center; font-weight: 350; animation: fadeIn 2s ease; width: 100%; }

.contact-form { width: 100%; max-width: 600px; animation: fadeIn 1.2s ease; padding: 40px 0; }
.form-row { display: flex; gap: 20px; margin-bottom: 25px; }
.form-group { flex: 1; display: flex; flex-direction: column; }
.form-group label { font-size: 0.7rem; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
.form-group input, .form-group textarea { background: transparent; border: none; border-bottom: 1px solid var(--text-very-dim); padding: 10px 0; color: var(--text-main); font-family: inherit; font-size: 0.85rem; outline: none; }
.form-group input:focus, .form-group textarea:focus { border-bottom-color: var(--dark-brown); }
.form-group textarea { min-height: 60px; resize: vertical; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

footer { text-align: center; padding: 60px 20px 40px; margin-top: auto; }
.social-links { margin-bottom: 15px; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--text-dim); }
.copyright { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-very-dim); text-transform: uppercase; }

/* 텍스트 제거 후 단독 사진 중앙 배치를 위한 미니멀 래퍼 설정 */
.profile-wrapper { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    width: 100%;
    margin: 0 auto; 
    animation: fadeIn 2s ease; 
}
.profile-img { width: 320px; height: auto; box-shadow: 15px 15px 0px var(--accent); object-fit: cover; }

@media (max-width: 1150px) {
    header { padding: 40px 0 20px; }
    nav { position: relative; top: 0; left: 0; width: 100%; text-align: center; margin-bottom: 50px; }
    nav ul li { display: block; margin-bottom: 20px; }
    .container { flex-direction: column; min-height: auto; }
    #content-area { padding: 0; min-height: 500px; }
    .form-row { flex-direction: column; gap: 25px; }
    .profile-wrapper { padding: 0 20px; }
    .profile-img { width: 280px; } /* 모바일에서 화면 비율에 맞춰 소폭 조정 */
}
</style>
    
</head>
<body>

    <header>
    <div class="logo-wrapper" onclick="updateGrid('PREVIEW')">
        <h1>Yeonsu</h1>
    </div>
</header>
    
    <div class="container">
        <nav>
            <ul id="menu-list">
                <li><a onclick="updateGrid('RECORDS')">RECORDS</a></li>
                <li><a onclick="updateGrid('MERCH')">MERCH</a></li>
                <li><a onclick="updateGrid('EVENTS')">EVENTS</a></li>
                <li><a onclick="updateGrid('CONTACT')">CONTACT</a></li>
            </ul>
        </nav>
        <div id="content-area">
            <div id="main-grid" style="width: 100%; display: flex; justify-content: center; align-items: center;"></div>
        </div>
    </div>

    <footer>
        <div class="social-links">
            <a href="https://soundcloud.com/dohwaz" target="_blank">SOUNDCLOUD</a>|
            <a href="https://www.youtube.com/@dohwaz" target="_blank">YOUTUBE</a>|
            <a href="https://www.instagram.com/dohwaz/" target="_blank">INSTAGRAM</a>
        </div>
        <div class="copyright">© 2026 DUSTN. ALL RIGHTS RESERVED.</div>
    </footer>

    <script>
      const CONTENT_CONFIG = {
            'RECORDS': '<div class="album-notice"><br>GONG</div>',
            'COMING_SOON': '<div class="album-notice">COMING SOON</div>',
         /* 메인 텍스트 요소를 완전히 비우고 사진만 정중앙에 배치 */
         'DEFAULT': `
    <div class="profile-wrapper">
        <img src="Profile.JPG" alt="Yeonsu" class="profile-img">
    </div>
`
        };

        function updateGrid(menuName) {
            const newURL = `${window.location.pathname}?page=${menuName}`;
            window.history.pushState({path: newURL}, '', newURL);

            document.querySelectorAll('#menu-list a').forEach(menu => {
                menu.classList.toggle('active', menu.innerText === menuName);
            });
            
            const grid = document.getElementById('main-grid');
            
            if (menuName === 'CONTACT') {
                renderContactForm(grid);
            } else {
                let html = CONTENT_CONFIG['DEFAULT'];
                if (menuName === 'RECORDS') html = CONTENT_CONFIG['RECORDS'];
                else if (['MERCH', 'LIVE', 'EVENTS'].includes(menuName)) html = CONTENT_CONFIG['COMING_SOON'];
                
                grid.innerHTML = html;
            }
        }

        function renderContactForm(container) {
            container.innerHTML = `
                <form id="mail-form" class="contact-form">
                    <div class="form-row">
                        <div class="form-group"><label>Name</label><input type="text" name="from_name" data-label="Name" placeholder="성함"></div>
                        <div class="form-group"><label>Email</label><input type="email" name="reply_to" data-label="Email" placeholder="이메일 주소"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Phone</label><input type="text" name="phone" data-label="Phone" placeholder="연락처"></div>
                        <div class="form-group"><label>Company</label><input type="text" name="company" data-label="Company" placeholder="소속 (개인일 경우 생략 가능)"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Event Date</label><input type="text" name="date" data-label="Event Date" placeholder="예상 날짜"></div>
                        <div class="form-group"><label>Event Location</label><input type="text" name="location" data-label="Event Location" placeholder="진행 장소"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Type of Event</label><input type="text" name="type" data-label="Type of Event" placeholder="공연 / 인터뷰 / 협업 등"></div>
                        <div class="form-group"><label>Performance Duration</label><input type="text" name="duration" data-label="Performance Duration" placeholder="예상 길이(시간) / 협업 기간"></div>
                    </div>
                    <div class="form-group" style="margin-bottom:25px;"><label>Budget Range</label><input type="text" name="budget" data-label="Budget Range" placeholder="예상 범위"></div>
                    <div class="form-group" style="margin-bottom:25px;"><label>Special Requests</label><textarea name="requests" data-label="Special Requests" placeholder="공연과 관련된 특정 요청(ex.특정 곡,테마)"></textarea></div>
                    <div class="form-group">
                        <label>Additional Details</label>
                        <textarea name="message" data-label="Additional Details" placeholder="이벤트 타이틀, 예상 관객 규모, 실내/실외, 무대 설정 등 추가적인 정보"></textarea>
                    </div>
                    <button type="button" class="submit-btn" onclick="validateForm()">SUBMIT</button>
                </form>`;
        }

        function validateForm() {
            const form = document.getElementById('mail-form');
            const inputs = form.querySelectorAll('input, textarea');
            let allDetails = "";

            for (const input of inputs) {
                if (!input.value.trim()) {
                    alert(`${input.getAttribute('data-label')} 항목을 작성해 주세요.`);
                    input.focus();
                    return;
                }
                allDetails += `${input.getAttribute('data-label')}: ${input.value}\n`;
            }

            const btn = document.querySelector('.submit-btn');
            btn.innerText = "SENDING...";
            btn.disabled = true;

            emailjs.send('service_cww7ffk', 'template_122vwoa', {
                from_name: form.from_name.value,
                reply_to: form.reply_to.value,
                message: allDetails
            }).then(() => {
                alert("Thank you. Your request has been sent.");
                form.reset();
            }).catch(error => {
                alert("Failed to send: " + JSON.stringify(error));
            }).finally(() => {
                btn.innerText = "SUBMIT";
                btn.disabled = false;
            });
        }

window.addEventListener('load', () => {
    const page = new URLSearchParams(window.location.search).get('page') || 'PREVIEW';
    requestAnimationFrame(() => {
        updateGrid(page);
    });
});

document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
}, false);
        
    </script>
</body>
</html>
